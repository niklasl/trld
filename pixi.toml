[workspace]
name = "trld"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10,<3.14"
mypy = ">=1.18.2,<2"
black = ">=25.1.0,<26"
pytest = ">=9.0.1,<10"
make = ">=4.4.1,<5"
openjdk = ">=11.0,<12"
nodejs = ">=20.0,<21"
hatch = ">=1.17.0,<2"
keyring = ">=25.7.0,<26"

[pypi-dependencies]
trld = { path = ".", editable = true }
